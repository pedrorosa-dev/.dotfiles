#:schema https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

version = 2
final_space = true
console_title_template = '{{ .Shell }} in {{ .Folder }}'

[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    type = "os"
    style = "plain"
    template = "{{.Icon}}"

    [properties]
    macos = "mac"

  [[blocks.segments]]
    type = 'path'
    background = 'transparent'
    foreground = 'blue'

    [blocks.segments.properties]
      style = 'powerlevel'
      folder_icon = '´ü╝'
      home_icon = '´Çò '
      max_width = 20
      cycle = ['cyan', 'magenta', 'blue']

  [[blocks.segments]]
    type = "git"
    style = "powerline"
    foreground = "green"
    background = "transparent"
    foreground_templates = [
      "{{ if or (.Working.Changed) (.Staging.Changed) }}#FFEB3B{{ end }}",
      "{{ if and (gt .Ahead 0) (gt .Behind 0) }}#FFCC80{{ end }}",
      "{{ if gt .Ahead 0 }}#B388FF{{ end }}",
      "{{ if gt .Behind 0 }}#B388FB{{ end }}"
    ]
    template = "<#FFFFFF>{{ url .UpstreamIcon .UpstreamURL }}</> {{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} ´üä <#22d3ee> ?{{.Working.Untracked}}</> ~{{ .Working.Modified }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} ´üå {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}<#34d399> ´âç {{ .StashCount }}</>{{ end }}"

    [blocks.segments.properties]
      fetch_status = true
      branch_max_length = 25
      fetch_upstream_icon = true
      truncate_symbol = 'ÔÇª'
      branch_icon = '´Éÿ '
      commit_icon = '@'


      [properties.untracked_modes]
      "/Users/user/Projects/oh-my-posh/" = "no"




[[blocks]]
  type = 'prompt'
  alignment = 'right'

  [[blocks.segments]]
    type = "elixir"
    style = "powerline"
    powerline_symbol = "¯é░"
    foreground = "#ffffff"
    background = "#422251"
    template = " ¯ÿ¡ {{ .Major }}.{{ .Minor }} "
  
  [[blocks.segments]]
    type = "node"
    style = "powerline"
    # foreground = "#ffffff"
    # background = "#6CA35E"
    foreground = "#6CA35E"
    template = " ¯£ÿ {{ .Major }}.{{ .Minor }} "

  [[blocks.segments]]
    type = "php"
    style = "powerline"
    # foreground = "#ffffff"
    # background = "#4063D8"
    foreground = "#4063D8"
    template = " ¯ÿê {{ .Major }}.{{ .Minor }} "

  [[blocks.segments]]
    type = "ruby"
    style = "powerline"
    # foreground = "#ffffff"
    # background = "#4063D8"
    foreground = "#CC342D"
    template = " ¯£╣ {{ .Major }}.{{ .Minor }} "

  [[blocks.segments]]
    type = "python"
    style = "powerline"
    # foreground = "#ffffff"
    # background = "#4063D8"
    foreground = "#FFFF00"
    template = " ¯£╝ {{ .Major }}.{{ .Minor }} "

  [[blocks.segments]]
    type = "java"
    style = "powerline"
    # foreground = "#ffffff"
    # background = "#4063D8"
    foreground = "#FF0000"
    template = " ¯£© {{ .Major }}.{{ .Minor }} "

  [[blocks.segments]]
    type = "typescript"
    style = "powerline"
    # foreground = "#ffffff"
    # background = "#4063D8"
    foreground = "#007ACC"
    template = " ¾░øª {{ .Major }}.{{ .Minor }} "

  [[blocks.segments]]
    type = "rust"
    style = "powerline"
    # foreground = "#ffffff"
    # background = "#4063D8"
    foreground = "#000000"
    template = " ¯Üï {{ .Major }}.{{ .Minor }} "

  [[blocks.segments]]
    type = "dart"
    style = "powerline"
    # foreground = "#ffffff"
    # background = "#4063D8"
    foreground = "#00B4AB"
    template = " ¯×ÿ {{ .Major }}.{{ .Minor }} "

[[blocks]]
  type = 'rprompt'
  overflow = 'hidden'

   [[blocks.segments]]
    type = "status"
    foreground = "#00897b"
    foreground_templates = [ "{{ if gt .Code 0 }}#e91e63{{ end }}" ]
    template = "¯ê║ " ## ¾░Çª ¯ê║ 



      [blocks.segments.properties]
      always_enabled = true

  [[blocks.segments]]
    type = 'executiontime'
    style = 'plain'
    foreground = 'yellow'
    background = 'transparent'
    template = '{{ .FormattedMs }}'

    [blocks.segments.properties]
      threshold = 5000

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    type = 'text'
    style = 'plain'
    foreground_templates = [
      "{{if gt .Code 0}}red{{end}}",
      "{{if eq .Code 0}}magenta{{end}}",
    ]
    background = 'transparent'
    template = 'ÔØ»'

[transient_prompt]
  foreground_templates = [
    "{{if gt .Code 0}}red{{end}}",
    "{{if eq .Code 0}}magenta{{end}}",
  ]
  background = 'transparent'
  template = 'ÔØ» '

[secondary_prompt]
  foreground = 'magenta'
  background = 'transparent'
  template = 'ÔØ»ÔØ» '
