# para instalar algo no tmux use prefix + I
unbind r
bind r source-file ~/.tmux.conf
set -g prefix C-s
bind-key Escape send-keys Escape
set -s escape-time 0

bind-key C-c new-window
bind-key C-s new-session
bind-key C-d  kill-window
bind-key C-x confirm-before kill-session
bind-key  C-] split-window -h
bind-key C-[ split-window
bind-key  C-n next-window
bind-key  C-v kill-pane
bind-key  C-p previous-window
bind-key C-b break-pane


# act like vim
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# List of plugins
set -g @plugin 'tmux-plugins/tpm'



# set -g @plugin 'dracula/tmux'
# set -g @dracula-show-powerline true
# set -g @dracula-fixed-location "BRASIL"
# set -g @dracula-plugins "weather"
# set -g @dracula-show-flags true
# set -g @dracula-show-left-icon session
set -g status-position bottom
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'erikw/tmux-powerline'
set -g @plugin "tmux-plugins/tmux-battery"
set -g @plugin 'jimeh/tmux-themepack'
set -g @themepack 'powerline/double/magenta'
# set -g @themepack 'powerline/default/gray'


# Habilitar suporte a 256 cores e cores verdadeiras
set-option -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

set -g @plugin 'sainnhe/tmux-fzf'
TMUX_FZF_LAUNCH_KEY="C-f"



# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
